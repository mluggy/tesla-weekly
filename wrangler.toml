# ⚠️ EDIT THESE before your first deploy — they are PLACEHOLDERS.
# - `name`: your Cloudflare Pages project name
# - `bucket_name`: your R2 bucket name
# Deployments will fail loudly until both are set. Kept empty on purpose:
# prevents a forgotten fork from writing to a shared default bucket.

name = "tesla-daily"
compatibility_date = "2026-03-01"
pages_build_output_dir = "dist"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "tesla-daily"
